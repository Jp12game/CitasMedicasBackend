openapi: 3.1.0
info:
  title: Citas Medicas Backend API
  version: 1.0.0
  description: API specification for the medical appointments backend described in the project PDF.
servers:
  - url: /api/v1
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Token
  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
          format: email
        roles:
          type: array
          items:
            type: string
    AuthSession:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: '#/components/schemas/User'
    Appointment:
      type: object
      properties:
        id:
          type: integer
        patient_id:
          type: integer
        doctor_id:
          type: integer
        date_time_begin:
          type: string
          format: date-time
        date_time_end:
          type: string
          format: date-time
        status:
          type: string
          enum: [scheduled, completed, cancelled]
    AvailabilitySlot:
      type: object
      properties:
        start:
          type: string
          format: date-time
        end:
          type: string
          format: date-time
    Availability:
      type: object
      properties:
        doctor:
          type: object
          nullable: true
          properties:
            id:
              type: integer
            name:
              type: string
            email:
              type: string
              format: email
        date:
          type: string
          format: date
        slots:
          type: array
          items:
            $ref: '#/components/schemas/AvailabilitySlot'
    Payment:
      type: object
      properties:
        id:
          type: integer
        appointment_id:
          type: integer
        patient_id:
          type: integer
        stripe_payment_intent_id:
          type: string
          nullable: true
        status:
          type: string
          enum: [pending, paid, failed]
        amount:
          type: integer
        currency:
          type: string
paths:
  /login:
    post:
      summary: Authenticate user with Sanctum
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        '200':
          description: Authenticated
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    $ref: '#/components/schemas/AuthSession'
        '401':
          description: Invalid credentials
  /logout:
    post:
      summary: Revoke the current token
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Token revoked
  /me:
    get:
      summary: Get authenticated user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Authenticated user
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    $ref: '#/components/schemas/User'
  /availability:
    get:
      summary: List available slots for a doctor on a date
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: doctor
          required: true
          schema:
            type: integer
        - in: query
          name: date
          required: true
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Availability loaded
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    $ref: '#/components/schemas/Availability'
        '422':
          description: Invalid query parameters
  /appointments:
    get:
      summary: List appointments
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Paginated appointments
    post:
      summary: Create appointment
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [patient_id, doctor_id, date_time_begin, date_time_end]
              properties:
                patient_id:
                  type: integer
                doctor_id:
                  type: integer
                date_time_begin:
                  type: string
                  format: date-time
                date_time_end:
                  type: string
                  format: date-time
      responses:
        '201':
          description: Appointment created
        '403':
          description: Not allowed
        '422':
          description: Validation error
  /appointments/history:
    get:
      summary: List appointment history for the authenticated user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Paginated history
  /appointments/{appointment}:
    get:
      summary: Show one appointment
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: appointment
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Appointment loaded
        '403':
          description: Not allowed
    put:
      summary: Update appointment by rescheduling it
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: appointment
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [doctor_id, date_time_begin, date_time_end]
              properties:
                doctor_id:
                  type: integer
                date_time_begin:
                  type: string
                  format: date-time
                date_time_end:
                  type: string
                  format: date-time
      responses:
        '200':
          description: Appointment updated
        '403':
          description: Not allowed
        '422':
          description: Validation error
    patch:
      summary: Update appointment by rescheduling it
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: appointment
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [doctor_id, date_time_begin, date_time_end]
              properties:
                doctor_id:
                  type: integer
                date_time_begin:
                  type: string
                  format: date-time
                date_time_end:
                  type: string
                  format: date-time
      responses:
        '200':
          description: Appointment updated
    delete:
      summary: Cancel appointment
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: appointment
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Appointment cancelled
        '403':
          description: Not allowed
  /appointments/{appointment}/confirm:
    patch:
      summary: Confirm an appointment
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: appointment
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Appointment confirmed
        '403':
          description: Not allowed
  /appointments/{appointment}/reschedule:
    patch:
      summary: Reschedule an appointment
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: appointment
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [doctor_id, date_time_begin, date_time_end]
              properties:
                doctor_id:
                  type: integer
                date_time_begin:
                  type: string
                  format: date-time
                date_time_end:
                  type: string
                  format: date-time
      responses:
        '200':
          description: Appointment rescheduled
        '403':
          description: Not allowed
        '422':
          description: Validation error
  /appointments/{appointment}/cancel:
    patch:
      summary: Cancel an appointment
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: appointment
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Appointment cancelled
        '403':
          description: Not allowed
  /payments/create-intent:
    post:
      summary: Create a Stripe payment intent for an appointment
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [appointment_id, amount]
              properties:
                appointment_id:
                  type: integer
                amount:
                  type: integer
                currency:
                  type: string
                  minLength: 3
                  maxLength: 3
      responses:
        '200':
          description: Payment intent created
        '403':
          description: Not allowed
  /payments/confirm:
    post:
      summary: Confirm a Stripe payment intent
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [payment_intent_id]
              properties:
                payment_intent_id:
                  type: string
      responses:
        '200':
          description: Payment confirmed
        '403':
          description: Not allowed
  /payments/simulate:
    post:
      summary: Simulate a Stripe test payment for the authenticated patient
      description: Available for local and testing environments to confirm a PaymentIntent with a Stripe test payment method.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [payment_intent_id]
              properties:
                payment_intent_id:
                  type: string
                payment_method:
                  type: string
                  example: pm_card_visa
      responses:
        '200':
          description: Payment simulated and marked as paid
        '403':
          description: Not allowed
        '404':
          description: Not available in production
        '422':
          description: Simulation did not produce a successful payment
